services:

  app:
    image: python_app:v0.1 
    container_name: app
    ports:
     - "5000:5000"
    environment:
      DB_HOST: host.docker.internal
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_PORT: 5432
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/users/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s